<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Coach — ForgeFit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Make this page fill the full viewport without scroll ── */
    html, body { height: 100%; overflow: hidden; }

    .app-layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 240px 1fr;
      padding-top: 64px;
      overflow: hidden;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem 2rem 1rem;
    }

    /* ── Header row ── */
    .chat-page-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    /* ── Chat card grows to fill space ── */
    .chat-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 0;
    }

    /* ── Messages: scrollable, fills remaining space ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }

    /* ── Suggested prompts bar ── */
    .suggested-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      padding: .65rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .suggested-prompt {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .3rem .8rem;
      font-size: .75rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .suggested-prompt:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow2); }

    /* ── Input row ── */
    .chat-input-row {
      display: flex;
      gap: .75rem;
      padding: .75rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Disclaimer ── */
    .chat-disclaimer {
      font-size: .72rem;
      color: var(--text-muted);
      text-align: center;
      padding: .4rem 0 0;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════
       TABLET  ≤ 1024px
       ═══════════════════════════════════ */
    @media (max-width: 1024px) {
      .app-layout { grid-template-columns: 1fr; }
      .main-content { padding: 1rem; }
    }

    /* ═══════════════════════════════════
       MOBILE  ≤ 768px
       ═══════════════════════════════════ */
    @media (max-width: 768px) {
      .app-layout { padding-top: 56px; }

      .main-content {
        padding: .6rem .75rem 0;
        height: calc(100vh - 56px - 60px); /* viewport - topnav - bottomnav */
        overflow: hidden;
      }

      .chat-page-header { margin-bottom: .5rem; }
      .chat-page-header h2 { font-size: 1.3rem; margin-bottom: 0; }
      .chat-page-header p  { font-size: .72rem; }
      .chat-page-header .btn { font-size: .72rem; padding: .35rem .75rem; }
      .chat-page-header > div:first-child {
        width: 36px !important; height: 36px !important; font-size: 1rem !important;
      }

      .chat-card {
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }

      .chat-messages { padding: .75rem; gap: .65rem; }

      .message-bubble { max-width: 90%; font-size: .875rem; padding: .65rem .875rem; }
      .message-avatar { width: 28px; height: 28px; font-size: .7rem; }

      /* Horizontal scroll for suggested prompts on mobile */
      .suggested-prompts {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: .45rem .75rem;
        gap: .35rem;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .suggested-prompts::-webkit-scrollbar { display: none; }
      .suggested-prompt { flex-shrink: 0; font-size: .7rem; padding: .25rem .6rem; }

      .chat-input-row { padding: .5rem .75rem; gap: .4rem; }
      .chat-input { font-size: .875rem; padding: .6rem .75rem; }
      #send-btn { padding: .6rem .875rem; font-size: .82rem; }

      .chat-disclaimer { display: none; }
    }

    @media (max-width: 400px) {
      .main-content { padding: .4rem .5rem 0; }
      .chat-page-header h2 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">FORGE<span>FIT</span></a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="workouts.html">Workouts</a>
    <a href="ai-coach.html" class="active">AI Coach</a>
    <a href="profile.html">Profile</a>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="GymApp.auth.logout()">Log Out</button>
</nav>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <a href="dashboard.html" class="sidebar-item"><span class="icon">📊</span>Dashboard</a>
      <a href="workouts.html" class="sidebar-item"><span class="icon">🏋️</span>My Workouts</a>
      <a href="ai-coach.html" class="sidebar-item active"><span class="icon">🤖</span>AI Coach</a>
      <a href="generator.html" class="sidebar-item"><span class="icon">⚡</span>Generate Plan</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <a href="profile.html" class="sidebar-item"><span class="icon">👤</span>Profile</a>
      <button class="sidebar-item" onclick="GymApp.auth.logout()"><span class="icon">🚪</span>Log Out</button>
    </div>
  </aside>

  <main class="main-content">

    <!-- Page Header -->
    <div class="chat-page-header">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--accent-glow);border:2px solid rgba(200,241,53,.3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">🤖</div>
      <div style="min-width:0;flex:1;">
        <h2 style="font-size:2rem;margin-bottom:.1rem;">AI Coach</h2>
        <p class="text-muted" style="font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Powered by AI · Personalised to your profile · Always available</p>
      </div>
      <button class="btn btn-ghost btn-sm" id="clear-btn" style="flex-shrink:0;">Clear Chat</button>
    </div>

    <!-- Chat Card -->
    <div class="chat-card">

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages"></div>

      <!-- Suggested Prompts (hidden after first send) -->
      <div class="suggested-prompts" id="suggested-prompts">
        <button class="suggested-prompt">💪 Best chest exercises?</button>
        <button class="suggested-prompt">🍽️ How much protein do I need?</button>
        <button class="suggested-prompt">😴 How to improve recovery?</button>
        <button class="suggested-prompt">📈 How to break a plateau?</button>
        <button class="suggested-prompt">🏃 Best cardio for fat loss?</button>
        <button class="suggested-prompt">🦵 How to fix squat form?</button>
      </div>

      <!-- Input -->
      <div class="chat-input-row">
        <input class="chat-input" type="text" id="chat-input"
               placeholder="Ask your AI coach anything…"
               maxlength="500" autocomplete="off">
        <button class="btn btn-primary" id="send-btn">Send</button>
      </div>
    </div>

    <p class="chat-disclaimer">AI advice is for informational purposes only and does not constitute medical advice.</p>

  </main>
</div>

<div id="toast-container"></div>
<script src="api.js"></script>
<script src="mobile.js"></script>
<script>
  if (!GymApp.requireAuth()) { throw new Error('auth'); }

  const user = GymApp.auth.currentUser();
  let history = [];

  // Greeting
  var greeting = 'Hey ' + (user && user.name ? user.name.split(' ')[0] : 'there') + '! 💪 I\'m your AI fitness coach.';
  if (user && user.fitnessLevel) greeting += ' I know you\'re a <strong>' + user.fitnessLevel + '</strong> athlete';
  if (user && user.goals && user.goals.length) greeting += ' working toward <strong>' + user.goals.join(', ').replace(/_/g,' ') + '</strong>';
  greeting += '.<br><br>Ask me anything — training, nutrition, recovery, form tips. Let\'s get to work!';
  addMessage('ai', greeting);

  // Suggested prompts
  document.querySelectorAll('.suggested-prompt').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.getElementById('chat-input').value = btn.textContent.slice(2).trim();
      sendMessage();
    });
  });

  // Enter key
  document.getElementById('chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('send-btn').addEventListener('click', sendMessage);

  document.getElementById('clear-btn').addEventListener('click', function() {
    history = [];
    document.getElementById('chat-messages').innerHTML = '';
    var sp = document.getElementById('suggested-prompts');
    if (sp) sp.style.display = 'flex';
    addMessage('ai', 'Chat cleared! What would you like to work on?');
  });

  async function sendMessage() {
    const input   = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const content = input.value.trim();
    if (!content || sendBtn.disabled) return;

    // Hide suggestions after first real message
    var sp = document.getElementById('suggested-prompts');
    if (sp) sp.style.display = 'none';

    input.value = '';
    addMessage('user', content);
    history.push({ role: 'user', content: content });

    const typingEl = addTyping();
    sendBtn.disabled = true;
    sendBtn.textContent = '…';
    input.disabled = true;

    try {
      var profile = user ? { fitnessLevel: user.fitnessLevel, goals: user.goals } : {};
      const data = await GymApp.ai.chat(history, profile);
      typingEl.remove();
      addMessage('ai', data.reply || 'No response received.');
      history.push({ role: 'assistant', content: data.reply || '' });
      if (history.length > 30) history = history.slice(-30);
    } catch (err) {
      typingEl.remove();
      addMessage('ai', '⚠️ ' + (err.message || 'Could not reach AI. Check server and .env.'));
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      input.disabled = false;
      input.focus();
    }
  }

  function addMessage(role, html) {
    const isAI = role === 'ai';
    const wrap = document.createElement('div');
    wrap.className = 'message ' + (isAI ? 'ai' : 'user');
    const initials = (user && user.name) ? user.name[0].toUpperCase() : 'U';
    const formatted = String(html)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    wrap.innerHTML =
      '<div class="message-avatar">' + (isAI ? '🤖' : initials) + '</div>' +
      '<div class="message-bubble">' + formatted + '</div>';
    const msgs = document.getElementById('chat-messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.innerHTML =
      '<div class="message-avatar">🤖</div>' +
      '<div class="message-bubble"><div class="typing-indicator">' +
      '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>' +
      '</div></div>';
    const msgs = document.getElementById('chat-messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  // Scroll to bottom when keyboard opens on mobile
  if ('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', function() {
      var msgs = document.getElementById('chat-messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    });
  }
</script>
</body>
</html>
