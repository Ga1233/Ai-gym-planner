<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Coach — ForgeFit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ══ DESKTOP LAYOUT ══ */
    html, body { height: 100%; overflow: hidden; }

    .app-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100vh;
      padding-top: 64px;
      overflow: hidden;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem 2rem 1rem;
      min-height: 0;
    }

    .chat-page-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
      margin-bottom: .75rem;
    }

    .chat-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }

    .suggested-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      padding: .65rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .suggested-prompt {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .3rem .8rem;
      font-size: .75rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .suggested-prompt:hover { border-color: var(--accent); color: var(--accent); }

    .chat-input-row {
      display: flex;
      gap: .75rem;
      padding: .75rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-card);
    }

    .chat-disclaimer {
      font-size: .72rem;
      color: var(--text-muted);
      text-align: center;
      padding: .35rem 0 0;
      flex-shrink: 0;
    }

    /* ══ TABLET ≤ 1024px ══ */
    @media (max-width: 1024px) {
      .app-layout { grid-template-columns: 1fr; }
      .main-content { padding: 1rem; }
    }

    /* ══ MOBILE ≤ 768px — FIXED INPUT APPROACH ══ */
    @media (max-width: 768px) {
      html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }

      /* Nav bar fixed at top */
      .nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        height: 56px;
      }

      /* Bottom nav fixed */
      .mobile-bottom-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 100;
        height: 60px;
      }

      /* Fixed input bar just above bottom nav */
      .mobile-input-bar {
        display: flex !important;
        position: fixed;
        bottom: 60px;
        left: 0; right: 0;
        z-index: 99;
        background: var(--bg-deep);
        border-top: 1px solid var(--border);
        padding: .6rem .75rem;
        gap: .5rem;
        align-items: center;
      }

      .mobile-input-bar .chat-input {
        flex: 1;
        font-size: 16px; /* prevents iOS zoom */
        padding: .65rem .875rem;
        background: var(--bg-raised);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-primary);
      }
      .mobile-input-bar .chat-input:focus {
        border-color: var(--accent);
        outline: none;
      }

      .mobile-input-bar #send-btn {
        flex-shrink: 0;
        padding: .65rem 1rem;
        font-size: .85rem;
      }

      /* Hide the desktop input row on mobile */
      .desktop-input-row { display: none !important; }

      /* App layout: fills between top nav and input bar */
      .app-layout {
        grid-template-columns: 1fr;
        height: 100vh;
        padding-top: 56px;
        overflow: hidden;
      }

      .main-content {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: .6rem .75rem 0;
        /* top nav + bottom nav + input bar */
        height: calc(100vh - 56px - 60px - 60px);
      }

      .chat-page-header {
        margin-bottom: .4rem;
        flex-shrink: 0;
      }
      .chat-page-header h2 { font-size: 1.25rem; margin-bottom: 0; }
      .chat-page-header p  { font-size: .68rem; }
      .chat-page-header .btn { font-size: .7rem; padding: .3rem .65rem; }
      .chat-page-header > div:first-child {
        width: 32px !important; height: 32px !important; font-size: .85rem !important;
      }

      .chat-card {
        flex: 1;
        min-height: 0;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        border-bottom: none;
      }

      .chat-messages {
        flex: 1;
        min-height: 0;
        padding: .65rem .75rem;
        gap: .6rem;
      }

      .message-bubble {
        max-width: 88%;
        font-size: .875rem;
        padding: .6rem .875rem;
      }
      .message-avatar { width: 28px; height: 28px; font-size: .7rem; flex-shrink: 0; }

      /* Horizontal scroll for suggested prompts */
      .suggested-prompts {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: .4rem .65rem;
        gap: .3rem;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .suggested-prompts::-webkit-scrollbar { display: none; }
      .suggested-prompt { flex-shrink: 0; font-size: .68rem; padding: .22rem .55rem; }

      /* Hide disclaimer on mobile */
      .chat-disclaimer { display: none; }
    }

    @media (max-width: 400px) {
      .main-content { padding: .4rem .5rem 0; }
      .chat-page-header h2 { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">FORGE<span>FIT</span></a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="workouts.html">Workouts</a>
    <a href="ai-coach.html" class="active">AI Coach</a>
    <a href="profile.html">Profile</a>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="GymApp.auth.logout()">Log Out</button>
</nav>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <a href="dashboard.html" class="sidebar-item"><span class="icon">📊</span>Dashboard</a>
      <a href="workouts.html" class="sidebar-item"><span class="icon">🏋️</span>My Workouts</a>
      <a href="ai-coach.html" class="sidebar-item active"><span class="icon">🤖</span>AI Coach</a>
      <a href="generator.html" class="sidebar-item"><span class="icon">⚡</span>Generate Plan</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <a href="profile.html" class="sidebar-item"><span class="icon">👤</span>Profile</a>
      <button class="sidebar-item" onclick="GymApp.auth.logout()"><span class="icon">🚪</span>Log Out</button>
    </div>
  </aside>

  <main class="main-content">
    <!-- Header -->
    <div class="chat-page-header">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--accent-glow);border:2px solid rgba(200,241,53,.3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">🤖</div>
      <div style="min-width:0;flex:1;">
        <h2 style="font-size:2rem;margin-bottom:.1rem;">AI Coach</h2>
        <p class="text-muted" style="font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Powered by AI · Personalised to your profile · Always available</p>
      </div>
      <button class="btn btn-ghost btn-sm" id="clear-btn" style="flex-shrink:0;">Clear Chat</button>
    </div>

    <!-- Chat Card -->
    <div class="chat-card">
      <div class="chat-messages" id="chat-messages"></div>

      <div class="suggested-prompts" id="suggested-prompts">
        <button class="suggested-prompt">💪 Best chest exercises?</button>
        <button class="suggested-prompt">🍽️ How much protein do I need?</button>
        <button class="suggested-prompt">😴 How to improve recovery?</button>
        <button class="suggested-prompt">📈 How to break a plateau?</button>
        <button class="suggested-prompt">🏃 Best cardio for fat loss?</button>
        <button class="suggested-prompt">🦵 How to fix squat form?</button>
      </div>

      <!-- Desktop input (hidden on mobile) -->
      <div class="chat-input-row desktop-input-row">
        <input class="chat-input form-input" type="text" id="chat-input-desktop"
               placeholder="Ask your AI coach anything…" maxlength="500" autocomplete="off">
        <button class="btn btn-primary" id="send-btn-desktop">Send</button>
      </div>
    </div>

    <p class="chat-disclaimer">AI advice is for informational purposes only and does not constitute medical advice.</p>
  </main>
</div>

<!-- Mobile input bar — fixed above bottom nav -->
<div class="mobile-input-bar" style="display:none;">
  <input class="chat-input" type="text" id="chat-input-mobile"
         placeholder="Ask your AI coach…" maxlength="500" autocomplete="off">
  <button class="btn btn-primary" id="send-btn-mobile">Send</button>
</div>

<div id="toast-container"></div>
<script src="api.js"></script>
<script src="mobile.js"></script>
<script>
  if (!GymApp.requireAuth()) { throw new Error('auth'); }

  var user = GymApp.auth.currentUser();
  var history = [];

  // ── Unified input/button references ──────────────────────
  // On mobile the fixed bar input is used; on desktop the card input.
  function getInput()   { return window.innerWidth <= 768 ? document.getElementById('chat-input-mobile')  : document.getElementById('chat-input-desktop');  }
  function getSendBtn() { return window.innerWidth <= 768 ? document.getElementById('send-btn-mobile') : document.getElementById('send-btn-desktop'); }

  // ── Greeting ──────────────────────────────────────────────
  var greeting = 'Hey ' + (user && user.name ? user.name.split(' ')[0] : 'there') + '! 💪 I\'m your AI fitness coach.';
  if (user && user.fitnessLevel) greeting += ' I know you\'re a <strong>' + user.fitnessLevel + '</strong> athlete';
  if (user && user.goals && user.goals.length) greeting += ' working toward <strong>' + user.goals.join(', ').replace(/_/g,' ') + '</strong>';
  greeting += '.<br><br>Ask me anything — training, nutrition, recovery, form tips. Let\'s get to work!';
  addMessage('ai', greeting);

  // ── Suggested prompts ────────────────────────────────────
  document.querySelectorAll('.suggested-prompt').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var inp = getInput();
      if (inp) inp.value = btn.textContent.slice(2).trim();
      sendMessage();
    });
  });

  // ── Wire both send buttons and inputs ────────────────────
  ['chat-input-desktop','chat-input-mobile'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  });
  document.getElementById('send-btn-desktop').addEventListener('click', sendMessage);
  document.getElementById('send-btn-mobile').addEventListener('click', sendMessage);

  // ── Clear ────────────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', function() {
    history = [];
    document.getElementById('chat-messages').innerHTML = '';
    var sp = document.getElementById('suggested-prompts');
    if (sp) sp.style.display = '';
    addMessage('ai', 'Chat cleared! What would you like to work on?');
  });

  // ── Send ─────────────────────────────────────────────────
  async function sendMessage() {
    var input   = getInput();
    var sendBtn = getSendBtn();
    if (!input) return;
    var content = input.value.trim();
    if (!content || sendBtn.disabled) return;

    var sp = document.getElementById('suggested-prompts');
    if (sp) sp.style.display = 'none';

    input.value = '';
    addMessage('user', content);
    history.push({ role: 'user', content: content });

    var typingEl = addTyping();
    // Disable both buttons
    ['send-btn-desktop','send-btn-mobile'].forEach(function(id){
      var b = document.getElementById(id);
      if (b) { b.disabled = true; b.textContent = '…'; }
    });
    ['chat-input-desktop','chat-input-mobile'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.disabled = true;
    });

    try {
      var profile = user ? { fitnessLevel: user.fitnessLevel, goals: user.goals } : {};
      var data = await GymApp.ai.chat(history, profile);
      typingEl.remove();
      addMessage('ai', data.reply || 'No response received.');
      history.push({ role: 'assistant', content: data.reply || '' });
      if (history.length > 30) history = history.slice(-30);
    } catch (err) {
      typingEl.remove();
      addMessage('ai', '⚠️ ' + (err.message || 'Could not reach AI. Check server and .env.'));
    } finally {
      ['send-btn-desktop','send-btn-mobile'].forEach(function(id){
        var b = document.getElementById(id);
        if (b) { b.disabled = false; b.textContent = 'Send'; }
      });
      ['chat-input-desktop','chat-input-mobile'].forEach(function(id){
        var el = document.getElementById(id);
        if (el) el.disabled = false;
      });
      if (input) input.focus();
    }
  }

  // ── Render message ───────────────────────────────────────
  function addMessage(role, html) {
    var isAI = role === 'ai';
    var wrap = document.createElement('div');
    wrap.className = 'message ' + (isAI ? 'ai' : 'user');
    var initials = (user && user.name) ? user.name[0].toUpperCase() : 'U';
    var formatted = String(html)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    wrap.innerHTML =
      '<div class="message-avatar">' + (isAI ? '🤖' : initials) + '</div>' +
      '<div class="message-bubble">' + formatted + '</div>';
    var msgs = document.getElementById('chat-messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  // ── Typing indicator ─────────────────────────────────────
  function addTyping() {
    var wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.innerHTML =
      '<div class="message-avatar">🤖</div>' +
      '<div class="message-bubble"><div class="typing-indicator">' +
      '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>' +
      '</div></div>';
    var msgs = document.getElementById('chat-messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }
</script>
</body>
</html>
